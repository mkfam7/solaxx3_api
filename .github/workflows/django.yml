name: Django CI

on:
  push:
    branches: ["main", "develop", "*"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-with-django-4:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        django-version: ["django_4.2.txt", "latest.txt"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "requirements/python${{ matrix.python-version }}/${{ matrix.django-version }}"
      - name: Run Tests
        run: |
          SECRET_KEY="fake" python manage.py test
      - name: Test setup
        run: |
          API_USERNAME=admin API_PASSWORD=admin bash setup.sh
          API_USERNAME=admin API_PASSWORD=admin bash start.sh -q &
          sleep 2
          test '{}' = "$(curl -s "http://localhost:8000/minute-stats/" -u admin:admin)"
