name: Django CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-with-django-4:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        django-version: ["Django>=5.0.0,<6.0.0", "Django~=4.2.0,<5.0.0"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ matrix.django-version }}" djangorestframework whitenoise drf-spectacular gunicorn
      - name: Run Tests
        run: |
          SECRET_KEY="fake" python manage.py test
      - name: Test setup
        run: |
          DJANGO_SUPERUSER_USERNAME=admin DJANGO_SUPERUSER_PASSWORD=admin bash setup.sh
          API_USERNAME=admin API_PASSWORD=admin bash start.sh -quf &
          sleep 2
          test '[]' = "$(curl -s "http://localhost:8000/minute-stats/?fields=all" -u admin:admin)"
